<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 Rocket Launch - Weighted Crash Game | Creator's Edge</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0b1525 100%);
            font-family: 'Segoe UI', 'Orbitron', 'Poppins', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 24px 20px;
            color: #eef5ff;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .game-panel {
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 24px 28px;
        }

        .rocket-zone {
            background: #03060e;
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 24px;
            border-bottom: 2px solid #0ff3;
            box-shadow: inset 0 0 20px #00aaff10;
        }

        canvas {
            display: block;
            width: 100%;
            height: 200px;
            background: radial-gradient(circle at 30% 20%, #0a1428, #000000);
            border-radius: 32px;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.2);
        }

        .multiplier-glass {
            font-size: 4rem;
            font-weight: 800;
            text-align: center;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 12px cyan;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f0f9ff, #7df9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 12px;
        }

        .crash-alert {
            text-align: center;
            font-weight: bold;
            padding: 8px;
            border-radius: 60px;
            background: #ff1e4d20;
            backdrop-filter: blur(4px);
        }

        .bet-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin: 20px 0 15px;
            background: #07121f80;
            padding: 18px 20px;
            border-radius: 48px;
        }

        .bet-input-group {
            flex: 2;
            min-width: 150px;
        }

        .bet-input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7fdbff;
        }

        .bet-input {
            background: #0e1a2a;
            border: 1px solid #2c5f7a;
            padding: 12px 18px;
            border-radius: 40px;
            width: 100%;
            font-size: 1.4rem;
            font-weight: bold;
            color: #f0fcff;
            font-family: monospace;
        }

        .quick-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .quick-btn {
            background: #1e2f44;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.1s linear;
        }

        .quick-btn:hover {
            background: #2f4b6e;
            transform: scale(0.96);
        }

        button {
            background: linear-gradient(95deg, #ff8c00, #ff2e6e);
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #7a2e4a;
            transition: 0.07s linear;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a2e4a;
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .cashout-btn {
            background: linear-gradient(95deg, #00c9ff, #92fe9e);
            color: #011522;
            box-shadow: 0 5px 0 #008060;
            font-weight: 800;
        }

        .balance-box {
            background: #00000066;
            border-radius: 40px;
            padding: 10px 20px;
            text-align: right;
            font-weight: bold;
            font-size: 1.5rem;
            font-family: monospace;
        }

        .admin-section {
            background: #07121fd9;
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border-left: 4px solid cyan;
            padding: 20px;
            overflow-x: auto;
        }

        .admin-title {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px dashed cyan;
            padding-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #2c4f6e;
        }

        th {
            color: #7df9ff;
            font-weight: 700;
        }

        .status-cashed { color: #a3ffb0; }
        .status-crashed { color: #ff7675; }
        .status-waiting { color: #ffe484; }

        footer {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="game-panel">
        <div class="rocket-zone">
            <canvas id="rocketCanvas" width="800" height="200" style="width:100%; height:200px"></canvas>
            <div class="multiplier-glass" id="multiplierDisplay">1.00x</div>
            <div id="roundStatus" class="crash-alert">⚡ Weighted crash distribution – creator's edge active ⚡</div>
        </div>

        <div class="bet-panel">
            <div class="bet-input-group">
                <label>🚀 YOUR BET (credits)</label>
                <input type="number" id="betAmount" class="bet-input" value="5.00" step="1" min="0.5">
            </div>
            <div class="quick-btns">
                <button class="quick-btn" data-bet="1">+1</button>
                <button class="quick-btn" data-bet="5">+5</button>
                <button class="quick-btn" data-bet="10">+10</button>
                <button class="quick-btn" data-bet="25">+25</button>
            </div>
            <button id="launchBtn">🚀 LAUNCH ROCKET</button>
            <button id="cashoutBtn" class="cashout-btn" disabled>💸 CASH OUT</button>
            <div class="balance-box">
                💰 BALANCE: <span id="playerBalance">100.00</span>
            </div>
        </div>
       
    </div>

    <div class="admin-section">
        <div class="admin-title">
            <span>🛸 ADMIN INTERFACE — LIVE MONITOR</span>
            <span style="font-size:12px;">(house edge via weighted blast)</span>
        </div>
        <div style="overflow-x: auto;">
            <table id="playersTable">
                <thead><tr><th>Player</th><th>💸 Bet</th><th>🎯 Cashed at</th><th>📊 Status</th><th>🏆 Profit</th><th>💰 Balance</th></tr></thead>
                <tbody id="playersTableBody"></tbody>
            </table>
        </div>
    </div>
   
</div>

<script>
    // ==================================================================
    //  ADVANCED BLAST CALCULATION WITH WEIGHTED DISTRIBUTION & MAX_CRASH
    // ==================================================================
    /**
     * Calculates the crash multiplier using a weighted distribution that favors the creator.
     * - Low multipliers (1.01 - 2.5): 60% probability
     * - Medium (2.5 - 6.0): 25% probability
     * - High (6.0 - 20.0): 12% probability
     * - Very High (20.0 - maxCrash): 3% probability
     * 
     * This ensures the expected multiplier is significantly lower than what a uniform distribution would give.
     * The house edge is built directly into the distribution shape.
     *
     * @param {number} maxCrash - Maximum possible multiplier (e.g., 30, 40, 50)
     * @returns {number} Crash point between 1.01 and maxCrash
     */
    function calculateWeightedBlastPoint(maxCrash = 30) {
        const MIN_CRASH = 1.01;
        const r = Math.random();
        let crash;

        if (r < 0.60) {        // 60%: low crash (1.01x – 2.5x)
            crash = MIN_CRASH + Math.random() * 1.49;
        } 
        else if (r < 0.85) {   // 25%: medium crash (2.5x – 6x)
            crash = 2.5 + Math.random() * 3.5;
        } 
        else if (r < 0.97) {   // 12%: high crash (6x – 20x)
            crash = 6 + Math.random() * 14;
        } 
        else {                 // 3%: very high crash (20x – maxCrash)
            crash = 20 + Math.random() * (maxCrash - 20);
        }

        // Final safety clamp
        crash = Math.min(maxCrash, Math.max(MIN_CRASH, crash));
        
        // Optional: Add a tiny extra house nudge (multiply by 0.98) for even more edge
        // crash = crash * 0.98;
        
        return parseFloat(crash.toFixed(3));
    }

    // ======================
    //  GAME STATE
    // ======================
    const INITIAL_BALANCE = 100;
    const MIN_BET = 0.5;
    const MAX_CRASH_LIMIT = 30;   // can be changed to 40 or 50

    let players = [
        { id: "p1", name: "🚀 ROCKET_MASTER (YOU)", type: "human", balance: INITIAL_BALANCE, roundBet: 0, cashedOut: false, cashoutMult: null, targetMult: null },
        { id: "p2", name: "🤖 ASTRO_BOT", type: "ai", balance: 85.0, roundBet: 0, cashedOut: false, cashoutMult: null, targetMult: null },
        { id: "p3", name: "🛸 NEBULA_BOT", type: "ai", balance: 72.5, roundBet: 0, cashedOut: false, cashoutMult: null, targetMult: null }
    ];

    let gameActive = false;
    let currentMultiplier = 1.00;
    let crashPoint = 2.50;
    let intervalId = null;
    let roundEnded = false;

    // DOM elements
    const canvas = document.getElementById('rocketCanvas');
    const ctx = canvas.getContext('2d');
    const multiplierSpan = document.getElementById('multiplierDisplay');
    const roundStatusDiv = document.getElementById('roundStatus');
    const launchBtn = document.getElementById('launchBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const betInput = document.getElementById('betAmount');
    const playerBalanceSpan = document.getElementById('playerBalance');
    const playersTableBody = document.getElementById('playersTableBody');

    // Helper: update UI
    function updateHumanBalanceUI() {
        const human = players.find(p => p.type === "human");
        if (human) playerBalanceSpan.innerText = human.balance.toFixed(2);
    }

    // Render admin table
    function renderAdminTable() {
        playersTableBody.innerHTML = '';
        for (let player of players) {
            const row = document.createElement('tr');
            const nameCell = document.createElement('td');
            nameCell.className = 'player-badge';
            nameCell.innerText = player.name;
            const betCell = document.createElement('td');
            betCell.innerText = player.roundBet > 0 ? player.roundBet.toFixed(2) : '—';
            const cashMultCell = document.createElement('td');
            if (player.cashedOut && player.cashoutMult !== null) cashMultCell.innerText = player.cashoutMult.toFixed(2) + 'x';
            else cashMultCell.innerText = '—';
            const statusCell = document.createElement('td');
            let statusText = '';
            if (!gameActive && !roundEnded) statusText = '⏳ idle';
            else if (gameActive && !player.cashedOut && player.roundBet > 0) statusText = '🚀 flying';
            else if (player.cashedOut) statusText = '✅ CASHED OUT';
            else if (roundEnded && !player.cashedOut && player.roundBet > 0) statusText = '💥 CRASHED';
            else if (player.roundBet === 0) statusText = '⚡ no bet';
            else statusText = '⌛ waiting';
            statusCell.innerText = statusText;
            if (statusText.includes('CASHED')) statusCell.className = 'status-cashed';
            else if (statusText.includes('CRASHED')) statusCell.className = 'status-crashed';
            else statusCell.className = 'status-waiting';

            const profitCell = document.createElement('td');
            let profitVal = 0;
            if (player.cashedOut && player.cashoutMult && player.roundBet) {
                profitVal = (player.roundBet * player.cashoutMult) - player.roundBet;
                profitCell.innerText = `+${profitVal.toFixed(2)}`;
                profitCell.style.color = '#a3ffb0';
            } else if (roundEnded && !player.cashedOut && player.roundBet > 0 && gameActive === false) {
                profitVal = -player.roundBet;
                profitCell.innerText = `${profitVal.toFixed(2)}`;
                profitCell.style.color = '#ff8888';
            } else if (player.roundBet === 0) profitCell.innerText = '0.00';
            else profitCell.innerText = 'pending';
            
            const balanceCell = document.createElement('td');
            balanceCell.innerText = player.balance.toFixed(2);
            
            row.appendChild(nameCell);
            row.appendChild(betCell);
            row.appendChild(cashMultCell);
            row.appendChild(statusCell);
            row.appendChild(profitCell);
            row.appendChild(balanceCell);
            playersTableBody.appendChild(row);
        }
    }

    function resetRoundPlayerData() {
        for (let p of players) {
            p.roundBet = 0;
            p.cashedOut = false;
            p.cashoutMult = null;
            p.targetMult = null;
        }
    }

    function getAITarget() {
        // AI targets are modest, they rarely chase high multipliers
        return 1.2 + Math.random() * 4.5;  // max ~5.7x
    }

    function cashoutPlayer(player, multAtCashout) {
        if (!gameActive) return false;
        if (player.cashedOut) return false;
        if (player.roundBet <= 0) return false;
        const winAmount = player.roundBet * multAtCashout;
        player.balance += winAmount;
        player.cashedOut = true;
        player.cashoutMult = multAtCashout;
        return true;
    }

    function endRound() {
        if (!gameActive && roundEnded) return;
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
        gameActive = false;
        roundEnded = true;
        roundStatusDiv.innerHTML = `💥 ROCKET CRASHED AT ${currentMultiplier.toFixed(2)}x ! 💥`;
        roundStatusDiv.style.background = "#ff1e4d40";
        cashoutBtn.disabled = true;
        launchBtn.disabled = false;
        betInput.disabled = false;
        renderAdminTable();
        updateHumanBalanceUI();
        drawCanvas(true);
    }

    function processAICashouts() {
        if (!gameActive) return;
        for (let p of players) {
            if (p.type === "ai" && !p.cashedOut && p.roundBet > 0 && p.targetMult !== null) {
                if (currentMultiplier >= p.targetMult) {
                    cashoutPlayer(p, currentMultiplier);
                }
            }
        }
        renderAdminTable();
        updateHumanBalanceUI();
    }

    function startRound(userBetAmount) {
        if (gameActive) return false;
        const humanPlayer = players.find(p => p.type === "human");
        let betVal = parseFloat(userBetAmount);
        if (isNaN(betVal) || betVal < MIN_BET) {
            roundStatusDiv.innerHTML = "⚠️ Minimum bet: 0.5 credits!";
            return false;
        }
        if (betVal > humanPlayer.balance) {
            roundStatusDiv.innerHTML = "❌ Insufficient balance!";
            return false;
        }
        
        if (intervalId) clearInterval(intervalId);
        resetRoundPlayerData();
        
        // Human bet
        humanPlayer.balance -= betVal;
        humanPlayer.roundBet = betVal;
        humanPlayer.cashedOut = false;
        humanPlayer.cashoutMult = null;
        humanPlayer.targetMult = null;
        
        // AI bets
        for (let p of players) {
            if (p.type === "ai") {
                if (p.balance >= 1.2) {
                    let aiBet = Math.min(p.balance - 0.5, Math.max(1.2, (Math.random() * 11) + 1));
                    aiBet = Math.floor(aiBet * 100) / 100;
                    if (aiBet > p.balance) aiBet = p.balance * 0.9;
                    if (aiBet < 1) aiBet = 1;
                    p.balance -= aiBet;
                    p.roundBet = aiBet;
                    p.cashedOut = false;
                    p.cashoutMult = null;
                    p.targetMult = getAITarget();
                } else {
                    p.roundBet = 0;
                    p.targetMult = null;
                }
            }
        }
        
        // ***** USE WEIGHTED BLAST FUNCTION WITH MAX_CRASH_LIMIT *****
        crashPoint = calculateWeightedBlastPoint(MAX_CRASH_LIMIT);
        
        currentMultiplier = 1.00;
        multiplierSpan.innerText = currentMultiplier.toFixed(2) + "x";
        gameActive = true;
        roundEnded = false;
        
        cashoutBtn.disabled = false;
        launchBtn.disabled = true;
        betInput.disabled = true;
        
        roundStatusDiv.innerHTML = `🚀 ROCKET LAUNCH! Max crash ${MAX_CRASH_LIMIT}x, weighted distribution active. Crash target: ${crashPoint.toFixed(2)}x 🚀`;
        roundStatusDiv.style.background = "#00aaff20";
        
        renderAdminTable();
        updateHumanBalanceUI();
        drawCanvas();
        
        intervalId = setInterval(() => {
            if (!gameActive) return;
            let increment = 0.025;
            currentMultiplier += increment;
            currentMultiplier = parseFloat(currentMultiplier.toFixed(3));
            multiplierSpan.innerText = currentMultiplier.toFixed(2) + "x";
            
            if (currentMultiplier >= crashPoint) {
                endRound();
                return;
            }
            
            processAICashouts();
            const human = players.find(p => p.type === "human");
            if (human && human.cashedOut) {
                cashoutBtn.disabled = true;
            } else if (gameActive && human && human.roundBet > 0 && !human.cashedOut) {
                cashoutBtn.disabled = false;
            } else {
                cashoutBtn.disabled = true;
            }
            drawCanvas();
            renderAdminTable();
            updateHumanBalanceUI();
        }, 72);
        return true;
    }
    
    function humanCashout() {
        const human = players.find(p => p.type === "human");
        if (!gameActive || !human || human.cashedOut || human.roundBet <= 0) return;
        const success = cashoutPlayer(human, currentMultiplier);
        if (success) {
            roundStatusDiv.innerHTML = `🎉 YOU CASHED OUT at ${currentMultiplier.toFixed(2)}x! +${(human.roundBet * currentMultiplier - human.roundBet).toFixed(2)} credits 🎉`;
            roundStatusDiv.style.background = "#00c9ff30";
            renderAdminTable();
            updateHumanBalanceUI();
            drawCanvas();
            cashoutBtn.disabled = true;
        }
    }
    
    // Canvas drawing (rocket animation)
    function drawCanvas(isCrashed = false) {
        if (!ctx) return;
        const width = canvas.clientWidth;
        const height = 200;
        canvas.width = width;
        canvas.height = height;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#010514";
        ctx.fillRect(0, 0, width, height);
        for(let i=0;i<80;i++) {
            ctx.fillStyle = `rgba(255,240,200,${Math.random()*0.5})`;
            ctx.fillRect( (i*131)%width, (i*57)%height, 1.5, 1.5);
        }
        ctx.fillStyle = "#4a6572";
        ctx.fillRect(0, height-18, width, 18);
        ctx.fillStyle = "#edb16b";
        ctx.fillRect(width/2-35, height-22, 70, 8);
        
        let progress = Math.min(1.0, currentMultiplier / 10.0);
        if (isCrashed && !gameActive) progress = Math.min(1.0, (crashPoint / 10.0));
        let rocketY = height - 38 - (progress * (height - 70));
        if (rocketY < 12) rocketY = 12;
        
        ctx.fillStyle = "#ff7700";
        ctx.beginPath();
        ctx.moveTo(width/2-8, rocketY+18);
        ctx.lineTo(width/2, rocketY+32);
        ctx.lineTo(width/2+8, rocketY+18);
        ctx.fill();
        ctx.fillStyle = "#ffcc44";
        ctx.beginPath();
        ctx.moveTo(width/2-4, rocketY+20);
        ctx.lineTo(width/2, rocketY+28);
        ctx.lineTo(width/2+4, rocketY+20);
        ctx.fill();
        
        ctx.fillStyle = "#d64531";
        ctx.beginPath();
        ctx.moveTo(width/2-12, rocketY+12);
        ctx.lineTo(width/2, rocketY-8);
        ctx.lineTo(width/2+12, rocketY+12);
        ctx.fill();
        ctx.fillStyle = "#ad2f1e";
        ctx.fillRect(width/2-8, rocketY+12, 16, 12);
        ctx.fillStyle = "#ffcf9a";
        ctx.beginPath();
        ctx.arc(width/2, rocketY+2, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#222";
        ctx.beginPath();
        ctx.arc(width/2-2, rocketY, 1.5, 0, Math.PI*2);
        ctx.arc(width/2+2, rocketY, 1.5, 0, Math.PI*2);
        ctx.fill();
        
        ctx.font = "bold 16px 'Orbitron'";
        ctx.fillStyle = "#ddffff";
        ctx.fillText(`${currentMultiplier.toFixed(2)}x`, width-70, 35);
        ctx.fillStyle = "#ffd966";
        ctx.font = "bold 12px monospace";
        if (gameActive) ctx.fillText("🚀 RISING", 15, 40);
        else ctx.fillText("💥 CRASH ZONE", 15, 40);
    }
    
    function setupQuickButtons() {
        const btns = document.querySelectorAll('.quick-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (gameActive) return;
                let addVal = parseFloat(btn.getAttribute('data-bet'));
                let currentBet = parseFloat(betInput.value);
                if (isNaN(currentBet)) currentBet = 0;
                let newBet = currentBet + addVal;
                const human = players.find(p => p.type === "human");
                if (human && newBet > human.balance) newBet = human.balance;
                if (newBet < 0.5) newBet = 0.5;
                betInput.value = newBet.toFixed(2);
            });
        });
    }
    
    function bindEvents() {
        launchBtn.addEventListener('click', () => {
            if (gameActive) return;
            let betVal = parseFloat(betInput.value);
            if (isNaN(betVal)) betVal = MIN_BET;
            startRound(betVal);
        });
        cashoutBtn.addEventListener('click', () => {
            if (!gameActive) return;
            humanCashout();
        });
        betInput.addEventListener('change', () => {
            if (gameActive) return;
            let val = parseFloat(betInput.value);
            const human = players.find(p => p.type === "human");
            if (isNaN(val)) val = MIN_BET;
            if (human && val > human.balance) val = human.balance;
            if (val < MIN_BET) val = MIN_BET;
            betInput.value = val.toFixed(2);
        });
    }
    
    function startAutoRefresh() {
        setInterval(() => {
            if (!gameActive) {
                renderAdminTable();
                updateHumanBalanceUI();
            } else {
                renderAdminTable();
                updateHumanBalanceUI();
            }
            drawCanvas();
        }, 180);
    }
    
    function init() {
        bindEvents();
        setupQuickButtons();
        resetRoundPlayerData();
        updateHumanBalanceUI();
        renderAdminTable();
        drawCanvas();
        startAutoRefresh();
        roundStatusDiv.innerHTML = "";
    }
    
    init();
</script>
</body>
</html>
